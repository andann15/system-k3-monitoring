services:

  # ── Database PostgreSQL ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: apd_postgres
    restart: always
    environment:
      POSTGRES_DB:       apd_monitor
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dashboard Streamlit ────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apd_dashboard
    restart: always
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    environment:
      - CAPTURE_DIR=/app/captures
    volumes:
      - ./captures:/app/captures
      - ./runs:/app/runs
    ports:
      - "8501:8501"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
